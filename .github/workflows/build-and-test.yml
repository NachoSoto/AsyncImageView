name: Build and Test

on:
  pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-6-build:
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: mxcl/xcodebuild@v3
        with:
          xcode: '26.5'
          action: none

      - name: Build library in Swift 6 mode
        run: |
          swift build \
            --target AsyncImageView \
            --triple arm64-apple-ios18.0-simulator \
            --sdk "$(xcrun --sdk iphonesimulator --show-sdk-path)"

  test:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run test suite
        uses: mxcl/xcodebuild@v3
        with:
          xcode: '26.5'
          scheme: AsyncImageView
          platform: iOS
          action: test
          warnings-as-errors: false
          verbosity: xcbeautify

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config .swiftlint.yml --reporter github-actions-logging --strict
